apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: sweldotrack
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          image: sweldotrack-frontend:latest
          imagePullPolicy: Never
          env:
            - name: NEXT_PUBLIC_API_URL
              value: http://192.168.1.3:30001
            - name: NEXTAUTH_URL
              value: http://192.168.1.3:30000
            - name: NEXTAUTH_SECRET
              valueFrom:
                secretKeyRef:
                  name: sweldotrack-secrets
                  key: NEXTAUTH_SECRET
          ports:
            - containerPort: 3000

---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: sweldotrack
spec:
  type: NodePort
  selector:
    app: frontend
  ports:
    - port: 3000
      targetPort: 3000
      nodePort: 30000

---
apiVersion: v1
kind: Service
metadata:
  name: backend-external
  namespace: sweldotrack
spec:
  type: NodePort
  selector:
    app: backend
  ports:
    - port: 4000
      targetPort: 4000
      nodePort: 30001