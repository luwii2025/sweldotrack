apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: sweldotrack
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          image: sweldotrack-backend:latest
          imagePullPolicy: Never
          env:
            - name: PORT
              value: "4000"
            - name: DB_HOST
              value: postgres
            - name: DB_PORT
              value: "5432"
            - name: DB_NAME
              value: sweldotrack_db
            - name: DB_USER
              value: sweldotrack
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: sweldotrack-secrets
                  key: DB_PASSWORD
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: sweldotrack-secrets
                  key: JWT_SECRET
            - name: JWT_EXPIRES_IN
              value: "8h"
          ports:
            - containerPort: 4000

---
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: sweldotrack
spec:
  selector:
    app: backend
  ports:
    - port: 4000
      targetPort: 4000