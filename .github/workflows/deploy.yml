name: Deploy SweldoTrack

"on":
  push:
    branches:
      - main
      
jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to server via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            cd ~/sweldotrack
            git pull

            # Rebuild images
            docker build \
              --build-arg NEXT_PUBLIC_API_URL=http://${{ secrets.SERVER_HOST }}:30001 \
              -t sweldotrack-frontend:latest ./frontend
            docker build -t sweldotrack-backend:latest ./backend
            docker build -t sweldotrack-payroll-engine:latest ./payroll-engine

            # Import into k3s
            docker save sweldotrack-frontend:latest | sudo k3s ctr images import -
            docker save sweldotrack-backend:latest | sudo k3s ctr images import -
            docker save sweldotrack-payroll-engine:latest | sudo k3s ctr images import -

            # Restart pods
            kubectl rollout restart deployment/frontend -n sweldotrack
            kubectl rollout restart deployment/backend -n sweldotrack
            kubectl rollout restart deployment/payroll-engine -n sweldotrack

            echo "✅ Deployment complete"