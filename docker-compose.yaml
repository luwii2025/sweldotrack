services:

  postgres:
    image: postgres:16
    container_name: sweldotrack-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: sweldotrack
      POSTGRES_PASSWORD: Water123!!
      POSTGRES_DB: sweldotrack_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - sweldotrack-network

  backend:
    build: ./backend
    container_name: sweldotrack-api
    restart: unless-stopped
    ports:
      - "4000:4000"
    environment:
      PORT: 4000
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: sweldotrack_db
      DB_USER: sweldotrack
      DB_PASSWORD: Water123!!
      JWT_SECRET: sweldotrack-dev-secret
      JWT_EXPIRES_IN: 8h
    depends_on:
      - postgres
    volumes:
      - ./backend:/app
      - /app/node_modules
    networks:
      - sweldotrack-network

  payroll-engine:
    build: ./payroll-engine
    container_name: sweldotrack-payroll
    restart: unless-stopped
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: sweldotrack_db
      DB_USER: sweldotrack
      DB_PASSWORD: Water123!!
    depends_on:
      - postgres
    volumes:
      - ./payroll-engine:/app
    networks:
      - sweldotrack-network

volumes:
  postgres_data:

networks:
  sweldotrack-network:
    driver: bridge